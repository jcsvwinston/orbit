// Nucleus Admin Observability Protocol — v1.
//
// This file is the single source of truth for the contract between:
//   * the agent embedded in every Nucleus framework process
//   * the standalone admin server
//   * the admin web UI
//
// Evolution rules are documented in admin/proto/EVOLUTION.md. Read them
// before changing this file.

syntax = "proto3";

package nucleus.admin.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/jcsvwinston/orbit/proto/gen/go/nucleus/admin/v1;adminv1";

// =============================================================================
// Shared messages
// =============================================================================

// NodeRegistration is sent by the agent immediately after the bidi stream is
// established. It identifies the framework process to the admin server.
message NodeRegistration {
  // Stable per-node identifier. UUIDv4 persisted at ${state_dir}/node_id with
  // hostname-derived ephemeral fallback. See agent/identity package.
  string node_id = 1;

  // Framework version (e.g. "v0.7.0"). Empty during local development is OK.
  string version = 2;

  // Free-form labels: role, zone, datacenter, hostname, pod, etc.
  map<string, string> labels = 3;

  // When this framework process started.
  google.protobuf.Timestamp started_at = 4;

  // Names of models registered with this agent's framework process. The
  // admin server uses this list to route Data Studio requests to an
  // agent that knows the model. Empty list means "this agent has no
  // model registry wired", which is the case for an agent that ships
  // only observability events and not Data Studio.
  repeated string registered_models = 5;
}

// Heartbeat keeps the node visible in the admin server topology even when the
// process emits no events.
message Heartbeat {
  google.protobuf.Timestamp timestamp = 1;

  // Bus statistics at the time of the heartbeat.
  uint32 active_subscriptions = 2;
  uint64 events_emitted_total = 3;
  uint64 events_dropped_total = 4;

  // Host metrics sample taken with this heartbeat (may be absent from older
  // agents; the server just forwards the latest one it saw).
  HostMetrics host_metrics = 5;
}

// EventType drives both per-type sampling and per-type routing in the admin
// server's ring buffers. Add new types at the end of the enum.
enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_HTTP_REQUEST = 1;
  EVENT_TYPE_SQL_STATEMENT = 2;
  EVENT_TYPE_SESSION_CHANGE = 3;
  EVENT_TYPE_CUSTOM = 4;
}

// Filter expresses what a subscriber wants to receive. All fields are AND'd;
// within a field, values are OR'd. An empty Filter means "no constraint" for
// that dimension.
message Filter {
  // Restrict to these event types. Empty = all types.
  repeated EventType types = 1;

  // HTTP path glob list (e.g. "/api/*", "/healthz"). Empty = all paths.
  repeated string http_path_globs = 2;

  // HTTP method allow-list (e.g. "GET", "POST"). Empty = all methods.
  repeated string http_methods = 3;

  // HTTP status class allow-list. Each entry is a digit string ("4", "5") that
  // matches any status code in that hundred (4xx, 5xx). Empty = all statuses.
  repeated string http_status_classes = 4;

  // SQL model allow-list (the registered model name). Empty = all models.
  repeated string sql_models = 5;

  // Restrict to these node IDs at the admin-server side. Empty = all nodes.
  repeated string node_ids = 6;
}

message HttpRequestEvent {
  string method = 1;
  string path = 2;
  uint32 status = 3;
  google.protobuf.Duration duration = 4;
  string request_id = 5;
  string trace_id = 6;
  string user_id = 7;
  string remote_ip = 8;
  string user_agent = 9;
  // payload_preview is a redacted summary of the request body or query string.
  // Sensitive keys are starred at the source.
  string payload_preview = 10;
}

message SqlStatementEvent {
  string model_name = 1;
  string operation = 2;
  string query = 3;

  // Sanitized argument representation. The agent never ships raw values for
  // string/bytes; only "type(len):***" markers. See agent/sanitize.
  repeated string args = 4;

  google.protobuf.Duration duration = 5;
  string error = 6;
  string request_id = 7;
  string trace_id = 8;
  string user_id = 9;
  // Driver-reported row count for exec-style statements; 0 means "not
  // reported" (SELECTs, drivers without support). Additive (W2).
  int64 rows_affected = 10;
}

message SessionChangeEvent {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_CREATED = 1;
    KIND_TOUCHED = 2;
    KIND_DESTROYED = 3;
  }
  Kind kind = 1;
  string token_short = 2;
  string user_id = 3;
  string ip = 4;
  string user_agent = 5;
  string last_route = 6;
  string trace_id = 7;
}

message CustomEvent {
  string name = 1;
  map<string, string> labels = 2;
  // Opaque payload chosen by the application. content_type lets the UI know
  // how to render it (e.g. "application/json", "text/plain").
  bytes payload = 3;
  string content_type = 4;
}

// Event is the unified envelope. Exactly one body field is set.
message Event {
  google.protobuf.Timestamp timestamp = 1;
  string node_id = 2;

  oneof body {
    HttpRequestEvent http_request = 10;
    SqlStatementEvent sql_statement = 11;
    SessionChangeEvent session_change = 12;
    CustomEvent custom = 13;
  }
}

// =============================================================================
// Commands (server -> agent)
// =============================================================================

message Subscribe {
  // Opaque, allocated by the admin server. Used to correlate Unsubscribe.
  string subscription_id = 1;

  Filter filter = 2;

  // Sampling rate per event type, 0.0 - 1.0. Missing entries default to 1.0.
  // Keys are EventType enum names without the EVENT_TYPE_ prefix
  // (e.g. "HTTP_REQUEST", "SQL_STATEMENT").
  map<string, float> sampling_rate = 3;
}

message Unsubscribe {
  string subscription_id = 1;
}

enum SnapshotType {
  SNAPSHOT_TYPE_UNSPECIFIED = 0;
  SNAPSHOT_TYPE_GO_RUNTIME = 1;
  SNAPSHOT_TYPE_DB_POOLS = 2;
  SNAPSHOT_TYPE_REGISTERED_MODELS = 3;
  SNAPSHOT_TYPE_CONFIG = 4;
  SNAPSHOT_TYPE_FEATURE_FLAGS = 5;
}

message SnapshotRequest {
  // Correlates SnapshotResponse on the same stream.
  string request_id = 1;
  SnapshotType type = 2;
}

message SnapshotResponse {
  string request_id = 1;
  SnapshotType type = 2;

  // JSON-encoded snapshot for forward compatibility — type-specific shapes can
  // evolve without breaking the proto. Schemas for each SnapshotType live in
  // admin/server/snapshot/SCHEMAS.md.
  bytes payload_json = 3;

  // Empty when the snapshot was produced successfully.
  string error = 4;
}

// Goodbye is sent by either side immediately before half-closing the stream
// during graceful shutdown.
message Goodbye {
  string reason = 1;
}

// Command groups every server-to-agent control message. Add new control
// payloads to the oneof; never repurpose existing tags.
message Command {
  oneof body {
    Subscribe subscribe = 1;
    Unsubscribe unsubscribe = 2;
    SnapshotRequest snapshot_request = 3;
    Goodbye goodbye = 4;
    DataStudioRequest data_studio = 5;
    RbacRequest rbac = 6;
  }
}

// =============================================================================
// Frame: multiplexed envelope on AgentService.Stream
// =============================================================================

// Frame is the envelope on the agent <-> admin bidi stream. Both directions
// reuse the same Frame; agents send registration/event/heartbeat/snapshot
// responses, admin servers send commands. Either side can send Goodbye.
message Frame {
  oneof body {
    NodeRegistration registration = 1;
    Event event = 2;
    Heartbeat heartbeat = 3;
    Command command = 4;
    SnapshotResponse snapshot_response = 5;
    Goodbye goodbye = 6;
    DataStudioResponse data_studio_response = 7;
    RbacResponse rbac_response = 8;
  }
}

// =============================================================================
// AgentService: agent <-> admin server
// =============================================================================

// AgentService is the bidi connection between an agent and an admin server.
// One stream per agent process. Auth (mTLS or shared bearer token) is
// negotiated at the transport layer; see admin/server/auth.
service AgentService {
  rpc Stream(stream Frame) returns (stream Frame);
}

// =============================================================================
// ControlService: UI <-> admin server
// =============================================================================

message NodeInfo {
  string node_id = 1;
  string version = 2;
  map<string, string> labels = 3;
  google.protobuf.Timestamp started_at = 4;
  google.protobuf.Timestamp last_seen_at = 5;
  bool connected = 6;

  // Last host metrics sample the agent shipped (via Heartbeat). Absent until
  // the first heartbeat with metrics arrives.
  HostMetrics host_metrics = 7;
}

// HostMetrics is a point-in-time sample of the agent process, shipped on every
// Heartbeat so the fleet UI can chart per-node runtime health. Fields the
// platform cannot report are zero (the UI renders them as absent).
message HostMetrics {
  // Process CPU busy share since the previous sample, 0-100 (user+system time
  // delta over wall-clock delta, via getrusage).
  double cpu_percent = 1;
  // Resident set size in bytes (Linux: /proc/self/statm; 0 elsewhere).
  uint64 rss_bytes = 2;
  uint64 heap_alloc_bytes = 3;
  uint32 goroutines = 4;
  // p99 of the Go runtime's recent GC pause ring, in milliseconds.
  double gc_pause_p99_ms = 5;
  // Framework database pool stats (zero when no managed DB).
  uint32 db_in_use = 6;
  uint32 db_idle = 7;
  uint32 db_max_open = 8;
}

message ListNodesRequest {}

message ListNodesResponse {
  repeated NodeInfo nodes = 1;
}

message StreamEventsRequest {
  Filter filter = 1;

  // See Subscribe.sampling_rate.
  map<string, float> sampling_rate = 2;

  // When true, replay the admin server's short ring buffer for matching event
  // types before going live. Useful for "open the panel and see something".
  bool include_recent = 3;
}

message GetSnapshotRequest {
  string node_id = 1;
  SnapshotType type = 2;
}

message Snapshot {
  string node_id = 1;
  SnapshotType type = 2;
  google.protobuf.Timestamp generated_at = 3;
  bytes payload_json = 4;
}

message GetSelfRequest {}

// SelfInfo echoes back who the caller is (as resolved by the UI auth chain)
// and what server they are talking to, so the operator can see the identity
// their actions are audited under and the exact server build. Additive:
// no field is required for older UIs.
message SelfInfo {
  // Operator identity from the auth chain: the UI user (trusted-proxy
  // X-Auth-User), "ui-bearer" for the bearer fallback, or "" when the
  // listener is unauthenticated.
  string subject = 1;
  // Optional email from the trusted proxy (X-Auth-Email).
  string email = 2;
  // "ui-operator" for an authenticated UI caller.
  string role = 3;
  // True when the operator is read-only (viewer role / --ui-read-only): the
  // UI hides Data Studio mutation controls.
  bool read_only = 4;
  // The admin server's build version (debug.ReadBuildInfo; "devel" for
  // source builds).
  string server_version = 5;
}

// ControlService is the API the admin web UI talks to. It is unary and
// server-streaming only — no client streaming, no bidi — so Connect-Web over
// HTTP/1.1 works without a websocket fallback.
service ControlService {
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc StreamEvents(StreamEventsRequest) returns (stream Event);
  rpc GetSnapshot(GetSnapshotRequest) returns (Snapshot);
  // GetSelf echoes the caller's identity + the server version for the UI.
  rpc GetSelf(GetSelfRequest) returns (SelfInfo);
}

// =============================================================================
// Data Studio (Phase 7): registered-model browse + CRUD via agent proxy
// =============================================================================
//
// The admin server does NOT have direct DB access. All Data Studio
// operations are routed to a connected agent that hosts the framework's
// model registry and DB handles. The agent executes the operation locally
// (preserving signals, validation, multi-tenant resolution, RBAC) and
// returns the result. This mirrors the Snapshot pattern: a request_id
// correlates DataStudioRequest (server -> agent on Stream) with
// DataStudioResponse (agent -> server on Stream).

// ModelField mirrors the relevant subset of pkg/model.FieldMeta: just
// the parts the UI needs to render a list view, a filter panel, or an
// edit form.
message ModelField {
  string name = 1;            // Go field name (e.g. "Email")
  string column = 2;          // SQL column name (e.g. "email")
  string label = 3;           // Human-readable label
  string go_type = 4;         // "string" | "int" | "bool" | "time" | ...
  string html_type = 5;       // "text" | "email" | "number" | "date" | ...
  bool is_primary_key = 6;
  bool is_required = 7;
  bool is_readonly = 8;
  bool is_in_list = 9;
  bool is_searchable = 10;
  bool is_filterable = 11;
  bool is_excluded = 12;
  bool is_foreign_key = 13;
  string foreign_model = 14;
  int32 max_length = 15;
  repeated FieldChoice choices = 16;
}

message FieldChoice {
  string value = 1;
  string label = 2;
}

message ModelInfo {
  string name = 1;            // Go struct name (e.g. "Article")
  string plural = 2;          // Plural ("Articles")
  string table = 3;           // SQL table ("articles")
  string database_alias = 4;
  string primary_key = 5;
  int64 record_count = 6;     // -1 when not requested or unknown
  bool record_count_estimated = 7;
}

message ModelSchema {
  ModelInfo info = 1;
  repeated ModelField fields = 2;
}

// Record carries field values as a map of field-name -> JSON-encoded
// scalar. This avoids encoding every Go runtime type into proto Any
// while keeping numeric / boolean / null fidelity. The UI parses with
// the schema's go_type to render appropriately.
message Record {
  map<string, string> values_json = 1;
}

message ListModelsRequest {
  bool include_counts = 1;
  string database_alias = 2;
  string node_id = 3;         // empty: server picks any agent that knows the models
}

message ListModelsResponse {
  repeated ModelInfo models = 1;
  string node_id = 2;         // which agent answered
}

message GetSchemaRequest {
  string node_id = 1;
  string model_name = 2;
  string database_alias = 3;
}

message ListRecordsRequest {
  string node_id = 1;
  string model_name = 2;
  string database_alias = 3;

  uint32 page = 10;
  uint32 page_size = 11;
  string search = 12;
  string order_by = 13;
  map<string, string> filters = 14;
  repeated string fields = 15;
}

message PaginatedRecords {
  repeated Record items = 1;
  uint32 page = 2;
  uint32 page_size = 3;
  int64 total = 4;            // -1 = unknown
  bool total_estimated = 5;
  bool has_more = 6;
  string node_id = 7;
}

message GetRecordRequest {
  string node_id = 1;
  string model_name = 2;
  string database_alias = 3;
  string id = 4;
}

message CreateRecordRequest {
  string node_id = 1;
  string model_name = 2;
  string database_alias = 3;
  Record record = 4;
}

message UpdateRecordRequest {
  string node_id = 1;
  string model_name = 2;
  string database_alias = 3;
  string id = 4;
  Record record = 5;
}

message DeleteRecordRequest {
  string node_id = 1;
  string model_name = 2;
  string database_alias = 3;
  string id = 4;
}

message DeleteRecordResponse {
  bool deleted = 1;
}

message BulkActionRequest {
  string node_id = 1;
  string model_name = 2;
  string database_alias = 3;
  string action = 4;          // "delete"
  repeated string ids = 5;
}

message BulkActionResponse {
  uint32 affected = 1;
  uint32 failed = 2;
  repeated string errors = 3;
}

// DataStudioRequest is sent from server to agent over the bidi
// AgentService.Stream multiplexed with events. Each request carries an
// opaque request_id the agent echoes in its DataStudioResponse so the
// server can correlate.
message DataStudioRequest {
  string request_id = 1;
  oneof body {
    ListModelsRequest list_models = 10;
    GetSchemaRequest get_schema = 11;
    ListRecordsRequest list_records = 12;
    GetRecordRequest get_record = 13;
    CreateRecordRequest create_record = 14;
    UpdateRecordRequest update_record = 15;
    DeleteRecordRequest delete_record = 16;
    BulkActionRequest bulk_action = 17;
  }
}

// DataStudioResponse travels agent -> server on the same Stream. error
// is non-empty when the operation failed; in that case the body oneof
// is unset.
message DataStudioResponse {
  string request_id = 1;
  string error = 2;
  oneof body {
    ListModelsResponse list_models = 10;
    ModelSchema schema = 11;
    PaginatedRecords records_page = 12;
    Record record = 13;
    DeleteRecordResponse delete_record = 14;
    BulkActionResponse bulk_action = 15;
  }
}

// DataStudioService is the UI-facing surface. The admin server
// translates each call into a DataStudioRequest on a chosen agent's
// stream and waits for the matching DataStudioResponse.
service DataStudioService {
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc GetSchema(GetSchemaRequest) returns (ModelSchema);
  rpc ListRecords(ListRecordsRequest) returns (PaginatedRecords);
  rpc GetRecord(GetRecordRequest) returns (Record);
  rpc CreateRecord(CreateRecordRequest) returns (Record);
  rpc UpdateRecord(UpdateRecordRequest) returns (Record);
  rpc DeleteRecord(DeleteRecordRequest) returns (DeleteRecordResponse);
  rpc BulkAction(BulkActionRequest) returns (BulkActionResponse);
}

// =============================================================================
// Manage: RBAC snapshot (server -> agent -> server) + fleet-plane audit
// =============================================================================

// RbacRequest asks a connected agent for a point-in-time snapshot of the
// application's Casbin roles and policies (read-only; the app's authorizer
// stays the single writer). Travels server -> agent inside Command.
message RbacRequest {
  string request_id = 1;
}

message RbacRole {
  string name = 1;
  // Number of subjects with a grouping rule onto this role.
  int32 members = 2;
}

message RbacPolicy {
  string subject = 1;
  string object = 2;
  string action = 3;
  // "allow" unless the policy row carries an explicit deny effect.
  string effect = 4;
}

// RbacResponse travels agent -> server on the same Stream. error is
// non-empty when the snapshot failed; in that case the lists are empty.
message RbacResponse {
  string request_id = 1;
  string error = 2;
  repeated RbacRole roles = 10;
  repeated RbacPolicy policies = 11;
}

// GetRbacRequest addresses one connected agent, like Data Studio does.
message GetRbacRequest {
  string node_id = 1;
}

message GetRbacResponse {
  repeated RbacRole roles = 1;
  repeated RbacPolicy policies = 2;
}

// AuditEntry is one fleet-plane action: something an operator did THROUGH
// the admin server (Data Studio mutations, and future manage actions).
// Per-app admin actions stay in each node's in-process Orbit audit ring;
// this log covers the fleet plane the server itself routes.
message AuditEntry {
  google.protobuf.Timestamp time = 1;
  // Operator identity as resolved by the UI auth chain.
  string actor = 2;
  // e.g. "datastudio.create", "datastudio.delete", "datastudio.bulk".
  string action = 3;
  // Human-readable target, e.g. "Article #42 (default)".
  string target = 4;
  // Agent the action was routed to.
  string node_id = 5;
}

message ListAuditRequest {
  // Maximum entries to return, newest first. 0 means the server default.
  int32 limit = 1;
}

message ListAuditResponse {
  repeated AuditEntry entries = 1;
}

// ManageService is the UI-facing surface for the Access control and Audit
// log screens. GetRbac is translated into an RbacRequest on the chosen
// agent's stream; ListAudit reads the server's own fleet-plane audit ring
// (in-memory, bounded, never persisted — same discipline as event replay).
service ManageService {
  rpc GetRbac(GetRbacRequest) returns (GetRbacResponse);
  rpc ListAudit(ListAuditRequest) returns (ListAuditResponse);
}
