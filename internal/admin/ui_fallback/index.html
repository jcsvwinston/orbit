<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nucleus Admin</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, sans-serif; background: #f6f7f9; color: #15171a; }
    main { width: min(720px, calc(100vw - 32px)); background: #fff; border: 1px solid #d8dde6; border-radius: 8px; padding: 24px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
    h1 { margin: 0 0 12px; font-size: 1.35rem; }
    p { margin: 0 0 16px; line-height: 1.5; color: #3f4652; }
    a { color: #1f6feb; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <h1>Nucleus Admin</h1>
    <p>The packaged React admin UI is not bundled in this build. The admin API remains available.</p>
    <a href="./api/models">Open models API</a>
  </main>
</body>
</html>
